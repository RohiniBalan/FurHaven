<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUY NOW</title>
    <link rel="stylesheet" href="index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="container-fluid buy-page">
      <div class="login-container p-3 rounded buy-now">
        <h2 class="text-center">BUY NOW</h2>
        <div class="form-floating mb-2 mt-3">
          <input
            type="text"
            class="form-control"
            id="floatingInput"
            placeholder="Rohini"
            required
          />
          <label for="floatingInput">Name</label>
        </div>
        <div class="form-floating mb-2">
          <input
            type="tel"
            class="form-control"
            id="floatingNumber"
            placeholder="phoneNumber"
            required
          />
          <label for="floatingNumber">Phone Number</label>
        </div>
        <div class="form-floating mb-2">
          <textarea
            class="form-control"
            placeholder="Leave a comment here"
            id="floatingTextarea2"
            style="height: 60px"
            required
          ></textarea>
          <label for="floatingTextarea2">Address</label>
        </div>
        <div class="form-floating mb-2">
          <input
            type="number"
            min="1"
            class="form-control"
            id="floatingQuantity"
            placeholder="Quantity"
            required
          />
          <label for="floatingQuantity">Quantity</label>
        </div>
        <div class="form-floating mb-4">
          <select class="form-select" id="floatingPayment" required>
            <option value="" selected disabled></option>
            <option value="cash">Cash on Delivery</option>
            <option value="upi">UPI</option>
            <option value="card">Debit / Credit Card</option>
          </select>
          <label for="floatingPayment">Payment Method</label>
        </div>

        <div class="row">
          <div class="col-6">
            <button class="btn w-100">Place Order</button>
          </div>
          <div class="col-6">
            <a href="javascript:history.back()" class="btn w-100 text-center"
              >Back</a
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
